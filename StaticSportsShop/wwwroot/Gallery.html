<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
        }

        .nav-link {
            cursor: pointer;
        }
    </style>

</head>

<body>


    <div class="container mt-5">

        <h2 class="text-center">Gallery</h2>


        <!-- MENU -->

        <div class="text-center mb-4">

            <button class="btn btn-primary" onclick="showGallery('scdta')">
                SCDTA
            </button>


            <button class="btn btn-primary" onclick="showGallery('aster')">
                ASTER
            </button>

            <button class="btn btn-primary" onclick="showGallery('Other')">
                OTHER
            </button>

        </div>



        <div class="row g-4" id="gallery-container">

        </div>



    </div>




    <script>

        const gallery = document.getElementById("gallery-container");


        function showGallery(type) {

            gallery.innerHTML = "";


            // SCDTA folder images
            if (type == "scdta") {

                for (let i = 1; i <= 57; i++) {

                    gallery.innerHTML += `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="gallery-item">

                        <a href="images/scdta${i}.JPG" target="_blank">
                            <img src="images/scdta${i}.JPG">
                        </a>

                    </div>
                </div>
                `;

                }

            }



            // ASTER images
            if (type == "aster") {

                for (let i = 37; i <= 56; i++) {

                    gallery.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3">

            <div class="gallery-item">

                <a href="images/${i}.jpeg" target="_blank">
                    <img src="images/${i}.jpeg">
                </a>

            </div>

        </div>
        `;

                }


                // ONE VIDEO AFTER IMAGES
//                gallery.innerHTML += `

//<div class="col-6 col-md-4 col-lg-3">

//    <div class="gallery-item">

//        <video controls>

//            <source src="Video/Video1.mp4" type="video/mp4">

//            Your browser does not support video.

//        </video>

//    </div>

//</div>

//`;
            }


            // Other images
            if (type == "Other") {


                let otherImages = [
                    "corperate.jpeg",
                    "Intercompany.jpeg",
                    "interschool.jpeg",
                    "sportstournament.jpeg",
                    "community.jpeg",
                    "Family.jpeg",
                    "EventOrganizing.jpeg",
                    "birthday.jpeg",
                    "wellness.jpeg"
                ];


                otherImages.forEach(img => {

                    gallery.innerHTML += `
                <div class="col-6 col-md-4 col-lg-3">

                    <div class="gallery-item">

                        <a href="images/${img}" target="_blank">
                            <img src="images/${img}">
                        </a>

                    </div>

                </div>
                `;

                });

                for (let i = 1; i <= 36; i++) {

                    gallery.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3">

            <div class="gallery-item">

                <a href="images/${i}.jpeg" target="_blank">
                    <img src="images/${i}.jpeg">
                </a>

            </div>

        </div>
        `;

                }

            }


        }


        // open SCDTA first
        showGallery("scdta");


    </script>

</body>
</html>
